# ~/.config/ffc/config.yaml
#
# ffc (Foxmayn Frappe CLI) configuration
# Copy to ~/.config/ffc/config.yaml and fill in your site details.
#
# Multiple sites are supported; use `ffc --site <name> list-docs ...` to switch.
# The `default_site` key selects which site is used when no --site flag is given.

default_site: dev

# Number format for displaying amounts in tables and reports.
# Run `ffc set-format` to change interactively.
# Options: french (default) | us | german | plain
#   french  →  1 000 000,00
#   us      →  1,000,000.00
#   german  →  1.000.000,00
#   plain   →  1000000.00
number_format: french

# Date format for displaying dates in tables and reports.
# Run `ffc config` to change interactively.
# Options: yyyy-mm-dd (default) | dd-mm-yyyy | mm/dd/yyyy
date_format: yyyy-mm-dd

sites:
  dev:
    url: "http://mysite.localhost:8000"
    api_key: "your_api_key_here"
    api_secret: "your_api_secret_here"

  # production:
  #   url: "https://erp.company.com"
  #   api_key: "prod_api_key"
  #   api_secret: "prod_api_secret"
